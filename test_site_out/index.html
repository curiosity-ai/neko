    <script>
        mermaid.initialize({ startOnLoad: false });

        async function renderMermaid() {
            const elements = document.querySelectorAll('.mermaid');
            if (!elements.length) return;

            for (const el of elements) {
                if (el.getAttribute('data-processed')) continue;
                el.setAttribute('data-processed', 'true');

                const source = el.textContent;
                const idBase = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                const idLight = idBase + '-light';
                const idDark = idBase + '-dark';

                // Render Light
                const sourceLight = `%%{init: {'theme':'default'}}%%\n${source}`;
                // Render Dark
                const sourceDark = `%%{init: {'theme':'dark'}}%%\n${source}`;

                try {
                    const rLight = await mermaid.render(idLight, sourceLight);
                    const rDark = await mermaid.render(idDark, sourceDark);

                    el.innerHTML = `
                        <div class="dark:hidden">${rLight.svg}</div>
                        <div class="hidden dark:block">${rDark.svg}</div>
                    `;

                    if (rLight.bindFunctions) rLight.bindFunctions(el.querySelector('.dark\\:hidden'));
                    if (rDark.bindFunctions) rDark.bindFunctions(el.querySelector('.dark\\:block'));
                } catch (e) {
                    console.error('Mermaid rendering failed:', e);
                    el.innerHTML = `<div class="text-red-500">Error rendering diagram</div>`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', renderMermaid);
    </script>

    <style>
        /* Highlight.js Line Numbers CSS */
        .prose table.hljs-ln tr { border: none !important; }
        .prose table.hljs-ln td { padding: 0 !important; }
        .prose table.hljs-ln td.hljs-ln-numbers { user-select: none; text-align: right; color: #ccc; border-right: 1px solid #ccc; vertical-align: top; padding-right: 5px !important; padding-left: 10px !important; }
        .prose table.hljs-ln td.hljs-ln-code { padding-left: 10px !important; }

        /* Hide Line Numbers when disabled but table is present (for highlighting) */
        .hide-line-numbers .hljs-ln-numbers { display: none !important; }
        .hide-line-numbers .hljs-ln-code { padding-left: 5px !important; }

        /* Custom Highlight Style */
        .line-highlight { background-color: rgba(255, 255, 0, 0.15); display: block; width: 100%; }
        .dark .line-highlight { background-color: rgba(255, 255, 0, 0.15); }

        /* Fix Table layout for code blocks with line numbers */
        .hljs-ln { width: 100%; border-collapse: collapse; }

        #sidebar::-webkit-scrollbar-thumb { background-color: transparent; border-radius: 3px; }
        #sidebar:hover::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); }
        .dark #sidebar:hover::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }

        /* TOC */

        /* Main Content */

        #main-scroll::-webkit-scrollbar-thumb { background-color: rgba(209, 213, 219, 0.5); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
        .dark #main-scroll::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
        #main-scroll::-webkit-scrollbar-thumb:hover { background-color: rgba(156, 163, 175, 0.8); }
        .dark #main-scroll::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.8); }
    </style>

    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleMobileMenu() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', toggleMobileMenu);
            sidebarOverlay.addEventListener('click', toggleMobileMenu);
        }
        if (sidebar) {
            const scrollKey = 'neko-sidebar-scroll';
            const timeKey = 'neko-sidebar-scroll-time';
            const savedScroll = localStorage.getItem(scrollKey);
            const savedTime = localStorage.getItem(timeKey);
            if (savedScroll && savedTime) {
                const now = new Date().getTime();
                if (now - parseInt(savedTime) < 60000) {
                    sidebar.scrollTop = parseInt(savedScroll);
                }
            }
            let timeout;
            sidebar.addEventListener('scroll', () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    localStorage.setItem(scrollKey, sidebar.scrollTop);
                    localStorage.setItem(timeKey, new Date().getTime());
                }, 100);
            });
        }
        const sidebarFilter = document.getElementById('sidebar-filter');
        const sidebarList = document.getElementById('sidebar-list');
        if (sidebarFilter && sidebarList) {
            sidebarFilter.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                // Expand all details when searching
                const details = sidebarList.querySelectorAll('details');
                if (term) details.forEach(d => d.open = true);

                const items = sidebarList.querySelectorAll('li, summary');
                items.forEach(item => {
                    // Avoid filtering the container li of nested lists, just filter leaf nodes or summary text
                    if (item.tagName === 'LI' && item.querySelector('details')) return;

                    const text = item.textContent.toLowerCase();
                    if (text.includes(term)) {
                        item.classList.remove('hidden');
                        // Make sure parent is visible
                        let parent = item.parentElement;
                        while(parent && parent !== sidebarList) {
                            parent.classList.remove('hidden');
                            if (parent.tagName === 'DETAILS') parent.open = true;
                            parent = parent.parentElement;
                        }
                    } else {
                        item.classList.add('hidden');
                    }
                });
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            let currentPath = window.location.pathname;
            if (currentPath.endsWith('.html')) currentPath = currentPath.substring(0, currentPath.length - 5);
            const sidebarLinks = document.querySelectorAll('#sidebar-list a');
            sidebarLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath || (href !== '/' && currentPath.startsWith(href) && (href.endsWith('/') || currentPath.charAt(href.length) === '/'))) {
                    link.classList.add('bg-primary-50', 'dark:bg-primary-900', 'text-primary-700', 'dark:text-primary-300', 'font-medium');
                    link.classList.remove('text-gray-700', 'dark:text-gray-200');
                    // Open parent details
                    let parent = link.parentElement;
                    while (parent && parent.id !== 'sidebar-list') {
                        if (parent.tagName === 'DETAILS') {
                            parent.open = true;
                        }
                        parent = parent.parentElement;
                    }
                }
            });
        });
        const tocLinks = document.querySelectorAll('.toc-link');
        const sections = [];
        tocLinks.forEach(link => {
            const id = link.getAttribute('data-id');
            const section = document.getElementById(id);
            if (section) sections.push(section);
        });

        const visibleSections = new Set();
        const highlightLine = document.getElementById('toc-highlight');
        const tocList = document.getElementById('toc-list');

        function updateTocHighlight() {
            if (!highlightLine || !tocList) return;

            // Clear all highlights
            document.querySelectorAll('.toc-link').forEach(link => {
                link.classList.remove('text-primary-600', 'dark:text-primary-400', 'font-medium');
            });

            let activeLinks = Array.from(document.querySelectorAll('.toc-link')).filter(link =>
                visibleSections.has(link.getAttribute('data-id'))
            );

            if (activeLinks.length === 0) {
                // Fallback to last passed section
                const passedSections = sections.filter(section => {
                    const rect = section.getBoundingClientRect();
                    return rect.top < 100;
                });

                if (passedSections.length > 0) {
                    const lastPassedSection = passedSections[passedSections.length - 1];
                    const id = lastPassedSection.id;
                    const link = document.querySelector(`.toc-link[data-id="${id}"]`);
                    if (link) {
                        activeLinks = [link];
                    }
                }
            }

            if (activeLinks.length === 0) {
                highlightLine.style.opacity = '0';
                return;
            }

            // Apply highlight
            activeLinks.forEach(link => {
                link.classList.add('text-primary-600', 'dark:text-primary-400', 'font-medium');
            });

            // Scroll TOC to active link
            const activeLink = activeLinks[0];
            const tocSidebar = document.getElementById('toc-sidebar');
            if (activeLink && tocSidebar) {
                const linkRect = activeLink.getBoundingClientRect();
                const sidebarRect = tocSidebar.getBoundingClientRect();
                if (linkRect.top < sidebarRect.top || linkRect.bottom > sidebarRect.bottom) {
                     activeLink.scrollIntoView({ block: 'center', behavior: 'smooth' });
                }
            }

            const firstLink = activeLinks[0];
            const lastLink = activeLinks[activeLinks.length - 1];

            const listRect = tocList.getBoundingClientRect();
            const firstRect = firstLink.getBoundingClientRect();
            const lastRect = lastLink.getBoundingClientRect();

            const top = firstRect.top - listRect.top;
            const height = lastRect.bottom - firstRect.top;

            highlightLine.style.top = `${top}px`;
            highlightLine.style.height = `${height}px`;
            highlightLine.style.opacity = '1';
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.id;
                if (entry.isIntersecting) {
                    visibleSections.add(id);
                } else {
                    visibleSections.delete(id);
                }
            });
            requestAnimationFrame(updateTocHighlight);
        }, {
            root: document.getElementById('main-scroll'),
            rootMargin: '0px 0px 0px 0px',
            threshold: 0
        });
        sections.forEach(section => observer.observe(section));
        const themeToggleBtn = document.getElementById('theme-toggle');
        const highlightLink = document.getElementById('highlight-theme');
        const darkHref = '/assets/highlight/tokyo-night-dark.min.css';
        const lightHref = '/assets/highlight/tokyo-night-light.min.css';

        function setTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                highlightLink.href = darkHref;
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                highlightLink.href = lightHref;
            }
            if (typeof renderMermaid === 'function') renderMermaid();
        }

        themeToggleBtn.addEventListener('click', () => {
            setTheme(!document.documentElement.classList.contains('dark'));
        });

        if (document.documentElement.classList.contains('dark')) {
            highlightLink.href = darkHref;
        } else {
            highlightLink.href = lightHref;
        }
        function openTab(evt, group, tabId) {
            var contents = document.querySelectorAll(`[id^='tab-${group}-']`);
            contents.forEach(c => c.classList.add('hidden'));
            var buttons = evt.currentTarget.parentElement.children;
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('border-primary-500', 'text-primary-600', 'dark:text-primary-400', 'font-medium');
                buttons[i].classList.add('border-transparent', 'hover:text-gray-700', 'text-gray-500');
            }
            document.getElementById(tabId).classList.remove('hidden');
            evt.currentTarget.classList.remove('border-transparent', 'hover:text-gray-700', 'text-gray-500');
            evt.currentTarget.classList.add('border-primary-500', 'text-primary-600', 'dark:text-primary-400', 'font-medium');
        }
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.copy-btn');
            if (!btn) return;
            const group = btn.closest('.group');
            const codeEl = group.querySelector('code');
            let text = "";
            if (codeEl.querySelector('.hljs-ln')) {
                codeEl.querySelectorAll('.hljs-ln-code').forEach(td => text += td.innerText + "\n");
            } else {
                text = codeEl.innerText;
            }
            navigator.clipboard.writeText(text).then(() => {
                const icon = btn.querySelector('i');
                const originalClass = icon.className;
                icon.className = 'fi fi-rr-check';
                setTimeout(() => icon.className = originalClass, 2000);
            });
        });
        document.addEventListener('DOMContentLoaded', (event) => {
            hljs.highlightAll();

            // Init Line Numbers
            document.querySelectorAll('code.hljs').forEach(block => {
                const language = Array.from(block.classList).find(c => c.startsWith('language-'))?.replace('language-', '');
                const configLineNumbers = window.nekoConfig?.snippets?.lineNumbers || [];
                const globalEnabled = language && configLineNumbers.includes(language);
                const localEnabled = block.classList.contains('line-numbers') || block.parentElement.classList.contains('line-numbers');
                const localDisabled = block.classList.contains('no-line-numbers') || block.parentElement.classList.contains('no-line-numbers');
                const hasHighlight = block.parentElement.getAttribute('data-highlight') || block.getAttribute('data-highlight');

                // We need the table if line numbers are enabled OR if highlighting is requested (as highlighting depends on the table)
                const needsTable = (globalEnabled || localEnabled || hasHighlight) && !(localDisabled && !hasHighlight);

                if (needsTable) {
                    // Hide numbers if explicitly disabled, or if not enabled (but table exists for highlight)
                    const hideNumbers = localDisabled || (!globalEnabled && !localEnabled);
                    if (hideNumbers) {
                        block.parentElement.classList.add('hide-line-numbers');
                    }
                    hljs.lineNumbersBlock(block, { singleLine: true });
                }
            });

            // Anchor Links
            document.querySelectorAll('h2, h3, h4, h5, h6').forEach(heading => {
                if (heading.id) {
                    heading.classList.add('group', 'relative');
                    const link = document.createElement('a');
                    link.href = '#' + heading.id;
                    link.className = 'absolute -left-6 top-0 bottom-0 flex items-center justify-center text-primary-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 no-underline';
                    link.innerHTML = '<i class="fi fi-rr-hashtag"></i>';
                    link.setAttribute('aria-label', 'Anchor');
                    heading.prepend(link);
                }
            });
        });
        window.addEventListener('load', function() {
            document.querySelectorAll('pre').forEach(pre => {
                const highlightRange = pre.getAttribute('data-highlight') || pre.querySelector('code')?.getAttribute('data-highlight');
                if (!highlightRange) return;
                const block = pre.querySelector('code');
                if (!block) return;
                const linesToHighlight = new Set();
                highlightRange.split(',').forEach(part => {
                    if (part.includes('-')) {
                        const [start, end] = part.split('-').map(Number);
                        for (let i = start; i <= end; i++) linesToHighlight.add(i);
                    } else {
                        linesToHighlight.add(Number(part));
                    }
                });
                const table = block.querySelector('.hljs-ln');
                if (table) {
                    const rows = table.querySelectorAll('tr');
                    rows.forEach((row, index) => {
                        if (linesToHighlight.has(index + 1)) {
                            row.classList.add('bg-yellow-100', 'dark:bg-yellow-900', 'bg-opacity-20', 'dark:bg-opacity-20');
                            row.querySelectorAll('td').forEach(td => td.style.backgroundColor = 'inherit');
                        }
                    });
                }
            });
        });
    </script>
