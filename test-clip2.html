<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>
<style>
  body { margin: 0; padding: 0; }
  #workflow-container { width: 500px; height: 300px; overflow: auto; border: 2px solid blue; position: relative; margin: 50px; background: #f0f0f0; }
  .node { width: 100px; height: 50px; background: #fff; border: 1px solid #ccc; position: absolute; }
  #node1 { top: 50px; left: 50px; }
  #node2 { top: 400px; left: 400px; }
</style>
</head>
<body>
  <div id="workflow-container">
    <div id="node1" class="node">Node 1</div>
    <div id="node2" class="node">Node 2</div>
  </div>
  <script>
    const container = document.getElementById('workflow-container');
    const existingLines = Array.from(document.querySelectorAll('.leader-line'));
    const lines = [];
    lines.push(new LeaderLine(document.getElementById('node1'), document.getElementById('node2'), { color: '#9ca3af', path: 'grid', size: 2, startPlug: 'behind', endPlug: 'arrow1' }));

    const currentLines = Array.from(document.querySelectorAll('.leader-line'));
    const newSvgs = currentLines.filter(el => !existingLines.includes(el));

    lines.forEach((line, index) => {
        const elmLine = newSvgs[index];
        if (!elmLine) return;
        elmLine.style.zIndex = 0;
        const clipId = `workflow-clip-${index}`;
        let defs = elmLine.querySelector('defs');
        if (!defs) { defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs'); elmLine.appendChild(defs); }
        const clipPath = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
        clipPath.id = clipId;
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        clipPath.appendChild(rect);
        defs.appendChild(clipPath);
        elmLine.style.clipPath = `url(#${clipId})`;
        line.svgElement = elmLine;
        line.clipRect = rect;
    });

    function updatePosition() {
        lines.forEach(line => {
            line.position();
            if (line.svgElement && line.clipRect) {
                const rectFrame = container.getBoundingClientRect();
                const pt1 = line.svgElement.createSVGPoint();
                pt1.x = rectFrame.left;
                pt1.y = rectFrame.top;
                const svgPt1 = pt1.matrixTransform(line.svgElement.getScreenCTM().inverse());
                const pt2 = line.svgElement.createSVGPoint();
                pt2.x = rectFrame.right;
                pt2.y = rectFrame.bottom;
                const svgPt2 = pt2.matrixTransform(line.svgElement.getScreenCTM().inverse());
                line.clipRect.x.baseVal.value = svgPt1.x;
                line.clipRect.y.baseVal.value = svgPt1.y;
                line.clipRect.width.baseVal.value = svgPt2.x - svgPt1.x;
                line.clipRect.height.baseVal.value = svgPt2.y - svgPt1.y;
            }
        });
    }

    container.addEventListener('scroll', updatePosition);
    window.addEventListener('scroll', updatePosition);
    updatePosition();
  </script>
</body>
</html>
