    <script>
        mermaid.initialize({ startOnLoad: false });

        async function renderMermaid() {
            const elements = document.querySelectorAll('.mermaid');
            if (!elements.length) return;

            for (const el of elements) {
                if (el.getAttribute('data-processed')) continue;
                el.setAttribute('data-processed', 'true');

                const source = el.textContent;
                const idBase = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                const idLight = idBase + '-light';
                const idDark = idBase + '-dark';

                // Render Light
                const sourceLight = `%%{init: {'theme':'default'}}%%\n${source}`;
                // Render Dark
                const sourceDark = `%%{init: {'theme':'dark'}}%%\n${source}`;

                try {
                    const rLight = await mermaid.render(idLight, sourceLight);
                    const rDark = await mermaid.render(idDark, sourceDark);

                    el.innerHTML = `
                        <div class="dark:hidden">${rLight.svg}</div>
                        <div class="hidden dark:block">${rDark.svg}</div>
                    `;

                    if (rLight.bindFunctions) rLight.bindFunctions(el.querySelector('.dark\\:hidden'));
                    if (rDark.bindFunctions) rDark.bindFunctions(el.querySelector('.dark\\:block'));
                } catch (e) {
                    console.error('Mermaid rendering failed:', e);
                    el.innerHTML = `<div class="text-red-500">Error rendering diagram</div>`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', renderMermaid);
    </script>
