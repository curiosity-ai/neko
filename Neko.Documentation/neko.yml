input: ./
output: .neko
url: localhost

branding:
  title: Neko
  logo: /assets/neko-logo.png
  favicon: /assets/favicon.ico
  repository: https://github.com/theolivenbaum/taildocs

meta:
  description: A modern, lightweight static site generator.
  keywords: static site generator, csharp, dotnet, documentation, markdown
  author: Neko Team
  image: /assets/neko-logo.png
  type: website
  twitterCard: summary
  twitterSite: "@neko"
  twitterCreator: "@neko"

links:
  - text: Home
    link: /
    icon: house-chimney
  - text: Guides
    link: guides/getting-started
    icon: book
  - text: GitHub
    link: https://github.com/theolivenbaum/taildocs
    icon: github
  - text: Features
    items:
      - text: Components
        link: /components/index
        description: Explore the rich set of built-in components
        icon: cube
      - text: Configuration
        link: /configuration/index
        description: Learn how to customize your Neko site
        icon: settings
      - text: Themes
        link: /guides/themes
        description: Style your documentation with ease
        icon: palette
    footerItems:
      - text: Get Started
        link: /guides/getting-started
        icon: rocket
      - text: View on GitHub
        link: https://github.com/theolivenbaum/taildocs
        icon: github

banner:
  text: "Welcome to Neko! Check out our new banner feature."
  link: /components/banner
  linkText: "Learn more"
  visible: true
  background: bg-indigo-600
  color: text-white
  id: neko-banner-v1
  dismissible: true
