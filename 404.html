                primaryBorderColor: _P('500', '#3b82f6'),

                secondaryBorderColor: _A('500', '#8b5cf6'),

        async function renderMermaid() {
            const elements = document.querySelectorAll('.mermaid');
            if (!elements.length) return;
            
            for (const el of elements) {
                if (el.getAttribute('data-processed')) continue;
                el.setAttribute('data-processed', 'true');
                
                const source = el.textContent;
                const idBase = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                const idLight = idBase + '-light';
                const idDark = idBase + '-dark';
                
                // A diagram can declare its own theme via %%{init: {'theme': ...}}%%.
                // When it does, render it verbatim so the author's choice fully wins —
                // prepending our themeVariables would otherwise leak onto their theme.
                const hasOwnTheme = /%%\{[^}]*\btheme\b/i.test(source);
                // Render Light / Dark with the brand init directive (unless overridden).
                const sourceLight = hasOwnTheme ? source : `%%{init: ${JSON.stringify(nekoMermaidLight)}}%%\n${source}`;
                const sourceDark = hasOwnTheme ? source : `%%{init: ${JSON.stringify(nekoMermaidDark)}}%%\n${source}`;
                
                try {
                    const rLight = await mermaid.render(idLight, sourceLight);
                    const rDark = await mermaid.render(idDark, sourceDark);
                    
                    el.innerHTML = `
                        <div class="dark:hidden w-full h-full flex items-center justify-center min-h-[inherit]">${rLight.svg}</div>
                        <div class="hidden dark:block w-full h-full flex items-center justify-center min-h-[inherit]">${rDark.svg}</div>
                        <div class="absolute bottom-4 right-4 flex bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md shadow-sm z-10 overflow-hidden">
                            <button class="zoom-in-btn px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors" title="Zoom In"><i class="fi fi-rr-plus"></i></button>
                            <button class="zoom-out-btn px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors border-l border-r border-gray-200 dark:border-gray-700" title="Zoom Out"><i class="fi fi-rr-minus"></i></button>
                            <button class="zoom-reset-btn px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 transition-colors" title="Reset Zoom"><i class="fi fi-rr-expand"></i></button>
                        </div>
                    `;
                    
                    const lightSvg = el.querySelector('.dark\\:hidden > svg');
                    const darkSvg = el.querySelector('.hidden.dark\\:block > svg');
                    lightSvg.classList.add("w-full");
                    lightSvg.classList.add("h-full");
                    lightSvg.classList.add("min-h-[inherit]");
                    darkSvg.classList.add("w-full");
                    darkSvg.classList.add("h-full");
                    darkSvg.classList.add("min-h-[inherit]");
                    
                    if (rLight.bindFunctions && lightSvg) rLight.bindFunctions(lightSvg);
                    if (rDark.bindFunctions && darkSvg) rDark.bindFunctions(darkSvg);
                    
                    const instances = [];
                    // beforeWheel returns true so the wheel never zooms the diagram —
                    // this lets page scroll pass through instead of being captured.

                    if (darkSvg) instances.push({svg: darkSvg, gpz: panzoom(darkSvg, pzOptions)});
                    
                    const zoomInBtn = el.querySelector('.zoom-in-btn');
                    const zoomOutBtn = el.querySelector('.zoom-out-btn');
                    const zoomResetBtn = el.querySelector('.zoom-reset-btn');
                    
                    if (zoomInBtn) {
                        zoomInBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            instances.forEach(instance => {
                                const rect = el.getBoundingClientRect();
                                instance.gpz.smoothZoom(rect.left + rect.width / 2, rect.top + rect.height / 2, 1.2);
                            });
                        });
                    }
                    if (zoomOutBtn) {
                        zoomOutBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            instances.forEach(instance => {
                                const rect = el.getBoundingClientRect();
                                instance.gpz.smoothZoom(rect.left + rect.width / 2, rect.top + rect.height / 2, 0.8);
                            });
                        });
                    }
                    if (zoomResetBtn) {
                        zoomResetBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            instances.forEach(instance => {
                                zoomToFit(instance.svg, instance.gpz);
                            });
                        });
                        window.setTimeout(_ => zoomResetBtn.click(), 250);
                    }
                } catch (e) {
                    console.error('Mermaid rendering failed:', e);
                    el.innerHTML = `<div class="text-red-500">Error rendering diagram</div>`;
                }
            }
        }

                const parent = svg.parentElement.parentElement;
                const rectParent = parent.getBoundingClientRect();
                const rectScene = svg.getBoundingClientRect();

                const xys = gpz.getTransform();
                const originWidth  = (rectScene.width + 20) / xys.scale;
                const originHeight = (rectScene.height + 20) / xys.scale;
                const zoomX = (rectParent.width - 40) / originWidth;
                const zoomY = (rectParent.height - 40) / originHeight;

                let targetScale = zoomX < zoomY ? zoomX : zoomY;

                //when target scale is the same as currently, we reset back to 100%, so it acts as toggle.
                if (Math.abs(targetScale - xys.scale) < 0.005) {
                    //reset to 100%
                    targetScale = 1;
                }

                const targetWidth = originWidth * xys.scale;
                const targetHeight = originHeight * xys.scale;
                const newX = targetWidth > rectParent.width ? -(targetWidth / 2) + rectParent.width / 2 : (rectParent.width / 2) - (targetWidth / 2);
                const newY = targetHeight > rectParent.height ? -(targetHeight / 2) + rectParent.height / 2 : (rectParent.height / 2) - (targetHeight / 2);

                //we need to cancel current running animations
                gpz.pause();
                gpz.resume();

                const xDiff = Math.abs(newX - xys.x);
                const yDiff = Math.abs(newX - xys.x);
                if (xDiff > 5 || yDiff > 5) {
                    //overything over 5px change will be animated
                    gpz.moveBy(
                        newX - xys.x,
                        newY - xys.y,
                        true
                    );
                    await new Promise(r => setTimeout(r, 250));
                } else {
                    gpz.moveBy(
                        newX - xys.x,
                        newY - xys.y,
                        false
                    );
                }

                //correct way to zoom with center of graph as origin when scaled
                gpz.smoothZoomAbs(
                    xys.x + originWidth * xys.scale / 2,
                    xys.y + originHeight * xys.scale / 2,
                    targetScale,
                );
            }

        /* Reset Tailwind Typography's <pre> defaults inside Neko code blocks. */
        /* Without this the prose <pre> keeps its own dark background, margin, */
        /* padding and rounding, so the code renders as a dark inset box floating */
        /* with gaps inside the lighter wrapper card. Let the wrapper own the */
        /* background, spacing and corners; the inner <code> keeps its padding. */
        .prose .neko-code-block > pre { margin: 0 !important; padding: 0 !important; background: transparent !important; border: 0 !important; border-radius: 0 !important; }

        /* Keep code text legible. Tailwind Typography colours <pre>/<code> */
        /* with low-specificity :where() rules that can win over the highlight */

        /* blocks highlight.js doesn't recognise (unknown language, or a Tesserae */
        /* block whose compile fell back to raw source) get no .hljs class at all */
        /* and render entirely in that grey. Re-assert the base text colour per */
        /* mode at higher specificity; highlighted .hljs-* spans keep their colours. */
        .prose .neko-code-block pre code { color: #24292e; }

        .prose .neko-code-block pre code { display: block; }

        /* Changelog version header — two states.
